<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Piega</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      min-height: 120px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #fafafa;
      color: #1a1a2e;
    }

    /* ── Header ── */
    header {
      background: #7c3aed;
      color: #fff;
      padding: 12px 16px 10px;
    }
    header .brand {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    header .sub {
      font-size: 11px;
      opacity: 0.8;
      margin-top: 1px;
    }
    header .source-badge {
      display: inline-block;
      margin-top: 6px;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 600;
      background: rgba(255,255,255,0.2);
      letter-spacing: 0.03em;
    }

    /* ── Hero row (address + price) ── */
    .hero {
      background: #ede9fe;
      padding: 10px 16px;
      border-bottom: 1px solid #ddd6fe;
    }
    .hero .address {
      font-weight: 600;
      font-size: 13px;
      color: #4c1d95;
      line-height: 1.35;
    }
    .hero .price-line {
      margin-top: 4px;
      font-size: 12px;
      color: #5b21b6;
    }
    .hero .pill {
      display: inline-block;
      background: #7c3aed;
      color: #fff;
      border-radius: 10px;
      padding: 1px 8px;
      font-size: 11px;
      font-weight: 600;
      margin-right: 4px;
    }

    /* ── Data table ── */
    .data-table {
      padding: 8px 0;
    }
    .row {
      display: flex;
      align-items: baseline;
      padding: 4px 16px;
    }
    .row:nth-child(even) { background: #f3f0ff; }
    .label {
      flex: 0 0 120px;
      color: #6b7280;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .value {
      flex: 1;
      font-weight: 500;
      word-break: break-word;
      color: #1a1a2e;
    }
    .value.null {
      color: #9ca3af;
      font-style: italic;
      font-weight: 400;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid #e5e7eb;
      padding: 10px 16px;
      display: flex;
      gap: 8px;
    }
    button {
      flex: 1;
      padding: 6px 0;
      border: 1px solid #7c3aed;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    #btn-copy { background: #fff; color: #7c3aed; }
    #btn-copy:hover { background: #ede9fe; }
    #btn-copy.copied { background: #7c3aed; color: #fff; border-color: #7c3aed; }

    /* ── States ── */
    .state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      text-align: center;
      color: #6b7280;
      gap: 8px;
    }
    .state .icon { font-size: 28px; }
    .state .msg  { font-size: 13px; font-weight: 500; }
    .state .hint { font-size: 11px; color: #9ca3af; }
    #spinner { animation: spin 0.9s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="brand">🏠 Piega</div>
  <div class="sub">Property Intelligence</div>
  <span class="source-badge" id="source-badge" style="display:none"></span>
</header>

<!-- States -->
<div id="state-loading" class="state">
  <span class="icon" id="spinner">⏳</span>
  <span class="msg">Reading page…</span>
</div>

<div id="state-not-rightmove" class="state" style="display:none">
  <span class="icon">🏡</span>
  <span class="msg">Not a Rightmove listing</span>
  <span class="hint">Visit a property page at rightmove.co.uk/properties/…</span>
</div>

<div id="state-no-data" class="state" style="display:none">
  <span class="icon">⚠️</span>
  <span class="msg">No data extracted yet</span>
  <span class="hint">Try refreshing the Rightmove page</span>
</div>

<!-- Data panel -->
<div id="panel" style="display:none">
  <div class="hero">
    <div class="address" id="hero-address">—</div>
    <div class="price-line" id="hero-price-line"></div>
  </div>

  <div class="data-table" id="data-table"></div>

  <footer>
    <button id="btn-copy">Copy JSON</button>
  </footer>
</div>

<script src="popup.js"></script>
</body>
</html>
